<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Especialidades</title>
</head>
<body>
    <h3>Listado de Especialidades</h3>
    <a href="/especialidad/agregar">Nueva Especialidad</a>
    <table border="1">
        <thead>
            <tr>
                <th>Acciones</th>
                <th>Código</th>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody>
            {% for especialidad in especialidades %}
            <tr>
                <td>
                    <a href="/especialidad/editar/{{especialidad.0}}">Editar</a>
                    <a href="/especialidad/eliminar/{{especialidad.0}}">Eliminar</a>
                </td>
                <td>{{especialidad.0}}</td>
                <td>{{especialidad.1}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="/">Volver al Menú</a>
</body>
</html>
